<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 430" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="axisArrow2" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
  </defs>

  <!-- ===== Timeline 1: the first incident ===== -->
  <text x="40" y="52" font-size="14" font-weight="bold" fill="#373a3c">The first incident</text>

  <!-- lost minutes shading -->
  <rect x="200" y="70" width="360" height="80" fill="#d9230f" opacity="0.07"/>
  <text x="380" y="95" text-anchor="middle" font-size="12.5" font-style="italic" fill="#a01b0b">witnesses are helping or running, nobody calls</text>
  <text x="380" y="113" text-anchor="middle" font-size="12.5" font-style="italic" fill="#a01b0b">the lost minutes</text>

  <line x1="60" y1="150" x2="900" y2="150" stroke="#868e96" stroke-width="1.5" marker-end="url(#axisArrow2)"/>

  <!-- t0: incident -->
  <path d="M200 150 l-7 -18 l10 6 l4 -12 l4 12 l10 -6 l-7 18 z" fill="#d9230f"/>
  <text x="200" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#373a3c">incident</text>
  <text x="200" y="196" text-anchor="middle" font-size="12" fill="#868e96">the cameras see everything,</text>
  <text x="200" y="212" text-anchor="middle" font-size="12" fill="#868e96">and do nothing</text>

  <!-- 911 call -->
  <circle cx="560" cy="150" r="7" fill="#2780e3"/>
  <text x="560" y="178" text-anchor="middle" font-size="13" font-weight="bold" fill="#373a3c">911 call</text>
  <text x="560" y="196" text-anchor="middle" font-size="12" fill="#868e96">from someone who</text>
  <text x="560" y="212" text-anchor="middle" font-size="12" fill="#868e96">reached safety first</text>

  <!-- response -->
  <rect x="648" y="136" width="8" height="28" fill="#373a3c"/>
  <path d="M656 136 h30 l-8 8 8 8 h-30 z" fill="#2780e3"/>
  <text x="672" y="188" text-anchor="middle" font-size="13" font-weight="bold" fill="#373a3c">response begins</text>

  <!-- ===== Timeline 2: the next incident ===== -->
  <text x="40" y="272" font-size="14" font-weight="bold" fill="#373a3c">The next one, with the tripwire armed</text>

  <rect x="200" y="330" width="170" height="70" fill="#2e8540" opacity="0.07"/>

  <line x1="60" y1="370" x2="900" y2="370" stroke="#868e96" stroke-width="1.5" marker-end="url(#axisArrow2)"/>

  <!-- t0: similar readings -->
  <path d="M200 370 l-7 -18 l10 6 l4 -12 l4 12 l10 -6 l-7 18 z" fill="#d9230f"/>
  <text x="185" y="398" text-anchor="middle" font-size="13" font-weight="bold" fill="#373a3c">similar readings</text>
  <text x="185" y="416" text-anchor="middle" font-size="12" fill="#868e96">a new clip matches the words</text>

  <!-- trigger fires -->
  <circle cx="268" cy="370" r="7" fill="#f0ad4e"/>
  <text x="272" y="344" text-anchor="middle" font-size="12.5" fill="#b07d2b">tripwire fires</text>

  <!-- response -->
  <rect x="356" y="356" width="8" height="28" fill="#373a3c"/>
  <path d="M364 356 h30 l-8 8 8 8 h-30 z" fill="#2e8540"/>
  <text x="404" y="398" text-anchor="start" font-size="13" font-weight="bold" fill="#2e8540">response begins</text>

  <text x="640" y="330" text-anchor="middle" font-size="13" font-style="italic" fill="#2e8540">before any call, or without one at all</text>
</svg>
