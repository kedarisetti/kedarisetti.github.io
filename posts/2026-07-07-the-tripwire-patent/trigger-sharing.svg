<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 340" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowShare" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b07d2b"/>
    </marker>
  </defs>

  <!-- source building -->
  <g>
    <rect x="80" y="80" width="150" height="160" rx="4" fill="#f8f9fa" stroke="#373a3c" stroke-width="1.5"/>
    <g fill="#2780e3" opacity="0.5">
      <rect x="100" y="100" width="22" height="18"/><rect x="144" y="100" width="22" height="18"/><rect x="188" y="100" width="22" height="18"/>
      <rect x="100" y="132" width="22" height="18"/><rect x="144" y="132" width="22" height="18"/><rect x="188" y="132" width="22" height="18"/>
      <rect x="100" y="164" width="22" height="18"/><rect x="144" y="164" width="22" height="18"/><rect x="188" y="164" width="22" height="18"/>
    </g>
    <rect x="140" y="204" width="30" height="36" fill="#373a3c"/>
    <!-- armed shield -->
    <path d="M155 46 l20 8 v14 c0 12 -8 21 -20 26 c-12 -5 -20 -14 -20 -26 v-14 z" fill="#f0ad4e"/>
    <text x="155" y="72" text-anchor="middle" font-size="14" font-weight="bold" fill="#ffffff">if</text>
    <text x="155" y="270" text-anchor="middle" font-size="13" font-weight="bold" fill="#373a3c">where it happened</text>
    <text x="155" y="288" text-anchor="middle" font-size="12" fill="#868e96">one real incident,</text>
    <text x="155" y="304" text-anchor="middle" font-size="12" fill="#868e96">one armed tripwire</text>
  </g>

  <!-- share arrows -->
  <path d="M 240 130 C 330 90, 430 90, 520 118" fill="none" stroke="#f0ad4e" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowShare)"/>
  <path d="M 240 200 C 380 280, 560 280, 708 205" fill="none" stroke="#f0ad4e" stroke-width="2.5" stroke-dasharray="7 5" marker-end="url(#arrowShare)"/>
  <text x="420" y="70" text-anchor="middle" font-size="13" font-style="italic" fill="#b07d2b">the trigger is copied to similar sensors</text>
  <text x="420" y="88" text-anchor="middle" font-size="13" font-style="italic" fill="#b07d2b">in similar buildings</text>

  <!-- sibling building 1 -->
  <g>
    <rect x="530" y="95" width="110" height="115" rx="4" fill="#f8f9fa" stroke="#868e96" stroke-width="1.5"/>
    <g fill="#868e96" opacity="0.45">
      <rect x="545" y="110" width="17" height="14"/><rect x="577" y="110" width="17" height="14"/><rect x="609" y="110" width="17" height="14"/>
      <rect x="545" y="134" width="17" height="14"/><rect x="577" y="134" width="17" height="14"/><rect x="609" y="134" width="17" height="14"/>
      <rect x="545" y="158" width="17" height="14"/><rect x="577" y="158" width="17" height="14"/><rect x="609" y="158" width="17" height="14"/>
    </g>
    <rect x="574" y="184" width="22" height="26" fill="#868e96"/>
    <path d="M585 76 l14 6 v10 c0 9 -6 15 -14 19 c-8 -4 -14 -10 -14 -19 v-10 z" fill="#f0ad4e" opacity="0.85"/>
    <text x="585" y="95" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">if</text>
    <text x="585" y="232" text-anchor="middle" font-size="12.5" fill="#373a3c">another office,</text>
    <text x="585" y="249" text-anchor="middle" font-size="12.5" fill="#373a3c">now watching too</text>
  </g>

  <!-- sibling building 2 -->
  <g>
    <rect x="720" y="130" width="110" height="115" rx="4" fill="#f8f9fa" stroke="#868e96" stroke-width="1.5"/>
    <g fill="#868e96" opacity="0.45">
      <rect x="735" y="145" width="17" height="14"/><rect x="767" y="145" width="17" height="14"/><rect x="799" y="145" width="17" height="14"/>
      <rect x="735" y="169" width="17" height="14"/><rect x="767" y="169" width="17" height="14"/><rect x="799" y="169" width="17" height="14"/>
      <rect x="735" y="193" width="17" height="14"/><rect x="767" y="193" width="17" height="14"/><rect x="799" y="193" width="17" height="14"/>
    </g>
    <rect x="764" y="219" width="22" height="26" fill="#868e96"/>
    <path d="M775 111 l14 6 v10 c0 9 -6 15 -14 19 c-8 -4 -14 -10 -14 -19 v-10 z" fill="#f0ad4e" opacity="0.85"/>
    <text x="775" y="130" text-anchor="middle" font-size="11" font-weight="bold" fill="#ffffff">if</text>
    <text x="775" y="267" text-anchor="middle" font-size="12.5" fill="#373a3c">a plant across town,</text>
    <text x="775" y="284" text-anchor="middle" font-size="12.5" fill="#373a3c">same kinds of sensors</text>
  </g>
</svg>
