<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 320" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#868e96"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#d9230f"/>
    </marker>
  </defs>

  <!-- Step 1: Incident reported -->
  <g>
    <rect x="20" y="60" width="190" height="130" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <circle cx="115" cy="105" r="26" fill="#2780e3" opacity="0.12"/>
    <path d="M115 88 a14 14 0 0 1 14 14 v6 l5 7 h-38 l5 -7 v-6 a14 14 0 0 1 14 -14 z" fill="#2780e3"/>
    <circle cx="115" cy="119" r="3.5" fill="#2780e3"/>
    <text x="115" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#373a3c">Incident reported</text>
    <text x="115" y="174" text-anchor="middle" font-size="12" fill="#868e96">911 call or alarm</text>
    <text x="30" y="46" font-size="12" font-weight="bold" fill="#2780e3">1</text>
  </g>

  <line x1="212" y1="125" x2="248" y2="125" stroke="#868e96" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 2: Retrieve sensor data -->
  <g>
    <rect x="252" y="60" width="190" height="130" rx="10" fill="#f8f9fa" stroke="#dee2e6" stroke-width="1.5"/>
    <!-- camera icon -->
    <rect x="317" y="92" width="34" height="22" rx="4" fill="#2780e3"/>
    <path d="M351 98 l14 -7 v24 l-14 -7 z" fill="#2780e3"/>
    <circle cx="330" cy="103" r="6" fill="#ffffff"/>
    <text x="347" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#373a3c">First sensor data</text>
    <text x="347" y="174" text-anchor="middle" font-size="12" fill="#868e96">same time &amp; place</text>
    <text x="262" y="46" font-size="12" font-weight="bold" fill="#2780e3">2</text>
  </g>

  <line x1="444" y1="125" x2="480" y2="125" stroke="#868e96" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Step 3: Trigger armed -->
  <g>
    <rect x="484" y="60" width="190" height="130" rx="10" fill="#fff8ec" stroke="#f0ad4e" stroke-width="1.5"/>
    <!-- shield with condition -->
    <path d="M579 84 l22 8 v16 c0 14 -9 24 -22 30 c-13 -6 -22 -16 -22 -30 v-16 z" fill="#f0ad4e"/>
    <text x="579" y="112" text-anchor="middle" font-size="16" font-weight="bold" fill="#ffffff">if</text>
    <text x="579" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#373a3c">Trigger armed</text>
    <text x="579" y="174" text-anchor="middle" font-size="12" fill="#868e96">condition + workflow</text>
    <text x="494" y="46" font-size="12" font-weight="bold" fill="#f0ad4e">3</text>
  </g>

  <line x1="676" y1="125" x2="712" y2="125" stroke="#d9230f" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrowRed)"/>

  <!-- Step 4: Workflow launches -->
  <g>
    <rect x="716" y="60" width="190" height="130" rx="10" fill="#fdf0ee" stroke="#d9230f" stroke-width="1.5"/>
    <!-- siren icon -->
    <path d="M795 118 h32 v8 h-38 v-8 z" fill="#d9230f"/>
    <path d="M799 118 v-10 a12 12 0 0 1 24 0 v10 z" fill="#d9230f"/>
    <line x1="811" y1="88" x2="811" y2="96" stroke="#d9230f" stroke-width="3" stroke-linecap="round"/>
    <line x1="791" y1="93" x2="796" y2="99" stroke="#d9230f" stroke-width="3" stroke-linecap="round"/>
    <line x1="831" y1="93" x2="826" y2="99" stroke="#d9230f" stroke-width="3" stroke-linecap="round"/>
    <text x="811" y="155" text-anchor="middle" font-size="14" font-weight="bold" fill="#373a3c">Workflow launches</text>
    <text x="811" y="174" text-anchor="middle" font-size="12" fill="#868e96">matched to incident type</text>
    <text x="726" y="46" font-size="12" font-weight="bold" fill="#d9230f">4</text>
  </g>

  <!-- annotation under step 3→4 -->
  <text x="694" y="222" text-anchor="middle" font-size="12.5" fill="#d9230f" font-style="italic">only if second sensor data</text>
  <text x="694" y="240" text-anchor="middle" font-size="12.5" fill="#d9230f" font-style="italic">meets the armed condition</text>

  <!-- annotation under steps 1-2 -->
  <text x="231" y="222" text-anchor="middle" font-size="12.5" fill="#868e96" font-style="italic">automatic, seconds after</text>
  <text x="231" y="240" text-anchor="middle" font-size="12.5" fill="#868e96" font-style="italic">the first report</text>

  <!-- title strip -->
  <text x="460" y="290" text-anchor="middle" font-size="13" fill="#868e96">US 12,634,398 B2 — the alarm-escalating trigger, step by step</text>
</svg>
